<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Primary Meta Tags -->
    <title>{{ page.title | default: site.title }}{% if page.title %} | {{ site.title }}{% endif %}</title>
    <meta name="title" content="{{ page.title | default: site.title }}{% if page.title %} | {{ site.title }}{% endif %}">
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    <meta name="author" content="{{ page.author | default: site.author | default: site.title }}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:url" content="{{ page.url | replace:'index.html','' | absolute_url }}">
    <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    <meta property="og:site_name" content="{{ site.title }}">
    {% if page.image %}
    <meta property="og:image" content="{{ page.image | absolute_url }}">
    {% endif %}
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ page.url | replace:'index.html','' | absolute_url }}">
    <meta property="twitter:title" content="{{ page.title | default: site.title | escape }}">
    <meta property="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    {% if page.image %}
    <meta property="twitter:image" content="{{ page.image | absolute_url }}">
    {% endif %}
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
    <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "{% if page.layout == 'post' %}BlogPosting{% else %}WebSite{% endif %}",
      "headline": "{{ page.title | default: site.title | escape }}",
      "description": "{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}",
      "url": "{{ page.url | replace:'index.html','' | absolute_url }}",
      {% if page.layout == 'post' %}
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.date | date_to_xmlschema }}",
      "author": {
        "@type": "Person",
        "name": "{{ page.author | default: site.author | default: site.title }}"
      },
      {% endif %}
      "publisher": {
        "@type": "Person",
        "name": "{{ site.author | default: site.title }}",
        "url": "{{ site.url }}"
      }
    }
    </script>

    <!-- MathJax Support -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N4H9P3SSX9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-N4H9P3SSX9');
    </script>
</head>

<body>
    <a href="#main-content" class="skip-to-main">Skip to main content</a>
    
    <header class="site-header" role="banner">
        <div class="container">
            <div class="site-title">
                <h1><a href="{{ '/' | relative_url }}" aria-label="Home - {{ site.title }}">{{ site.title }}</a></h1>
                <p>{{ site.description }}</p>
            </div>
            <nav class="site-nav" role="navigation" aria-label="Main navigation">
                <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
            </nav>
        </div>
    </header>

    <main id="main-content" class="page-content container" role="main">
        {{ content }}
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} &middot; Australia</p>
            {% if site.youtube_channel %}
            <p><a href="{{ site.youtube_channel }}" target="_blank" rel="noopener noreferrer" aria-label="Visit YouTube channel (opens in new tab)">YouTube Channel</a></p>
            {% endif %}
        </div>
    </footer>
</body>

</html>
